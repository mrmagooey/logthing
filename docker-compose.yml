version: '3.8'

services:
  logthing:
    build: .
    ports:
      - "5985:5985"       # HTTP WEF endpoint
      - "5986:5986"       # HTTPS WEF endpoint
      - "9090:9090"       # Prometheus metrics
      - "514:514/udp"     # Syslog (UDP)
      - "601:601/tcp"     # Syslog (TCP)
      - "4739:4739/udp"   # IPFIX
    volumes:
      - ./logthing.toml:/etc/logthing/config.toml:ro
      # Uncomment to mount TLS certificates:
      # - ./certs:/etc/logthing/certs:ro
    environment:
      - RUST_LOG=info
    networks:
      - logthing-network
    restart: unless-stopped

  # Example: Elasticsearch for log storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - logthing-network

  # Example: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - logthing-network
    depends_on:
      - logthing

networks:
  logthing-network:
    driver: bridge
