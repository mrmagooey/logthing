bind_address = "0.0.0.0:5985"

[tls]
enabled = false
port = 5986
require_client_cert = false

[security]
allowed_ips = []
max_connections = 10000
connection_timeout_secs = 300

[security.kerberos]
enabled = false

[forwarding]
destinations = []
buffer_size = 10000
retry_attempts = 3

[logging]
level = "info"
format = "pretty"

[metrics]
enabled = true
port = 9090

[syslog]
enabled = true
udp_port = 514
tcp_port = 601
parse_dns = true

[ipfix]
enabled = false
udp_port = 4739
bind_address = "0.0.0.0"

[zeek]
enabled = false
tcp_port = 47760
bind_address = "0.0.0.0"
