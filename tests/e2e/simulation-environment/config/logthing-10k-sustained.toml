[logging]
level = "info"
format = "pretty"

[metrics]
enabled = true
port = 9100

[syslog]
enabled = true
udp_port = 5514
tcp_port = 5601
parse_dns = true

[forwarding]
buffer_size = 100000
retry_attempts = 3

[wef.s3]
endpoint   = "http://minio:9000"
bucket     = "wef-events"
region     = "us-east-1"
access_key = "miniouser"
secret_key = "miniopassword"
# prefix defaults to "" (empty) — preserves event_type=.../year=... layout at root
flush_threshold_bytes = 104857600
flush_interval_secs   = 60
