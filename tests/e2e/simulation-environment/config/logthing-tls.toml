bind_address = "0.0.0.0:5985"

[logging]
level = "info"
format = "pretty"

[tls]
enabled = true
port = 5986
cert_file = "/etc/wef-server/certs/server.crt"
key_file = "/etc/wef-server/certs/server.key"

[metrics]
enabled = true
port = 9100

[syslog]
enabled = true
udp_port = 5514
tcp_port = 5601
parse_dns = true

[forwarding]
buffer_size = 10
retry_attempts = 1

[wef.s3]
endpoint   = "http://minio:9000"
bucket     = "wef-events"
region     = "us-east-1"
access_key = "miniouser"
secret_key = "miniopassword"
# prefix defaults to "" (empty) — preserves event_type=.../year=... layout at root
flush_threshold_bytes = 1
flush_interval_secs   = 5
