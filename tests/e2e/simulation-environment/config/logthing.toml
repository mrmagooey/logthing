[logging]
level = "info"
format = "pretty"

[metrics]
enabled = true
port = 9100

[syslog]
enabled = true
udp_port = 5514
tcp_port = 5601
parse_dns = true

[syslog.s3]
endpoint   = "http://minio:9000"
bucket     = "wef-events"
region     = "us-east-1"
access_key = "miniouser"
secret_key = "miniopassword"
prefix     = "syslog"
max_buffer_rows     = 10
flush_interval_secs = 5

[ipfix]
enabled = true
udp_port = 4739

[ipfix.s3]
endpoint   = "http://minio:9000"
bucket     = "ipfix-flows"
region     = "us-east-1"
access_key = "miniouser"
secret_key = "miniopassword"
prefix     = "ipfix"
flush_threshold_bytes = 1
flush_interval_secs   = 5

[forwarding]
buffer_size = 10000
retry_attempts = 3

[[forwarding.destinations]]
name = "parquet"
url = "s3://wef-events/archive"
protocol = "http"
enabled = true

[forwarding.destinations.headers]
endpoint = "http://minio:9000"
region = "us-east-1"
"access-key" = "miniouser"
"secret-key" = "miniopassword"
"max-size-mb" = "1"
"flush-interval-secs" = "5"
"buffer-path" = "/tmp/wef-events"
